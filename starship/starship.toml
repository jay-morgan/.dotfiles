# format = '$all$directory$character'
add_newline = false

# A minimal left prompt
format = """$directory$character"""
palette = "melange"

# move the rest of the prompt to the right
#right_format = """$all"""

right_format = """
$username\
$hostname\
$package\
$git_branch\
$git_commit\
$git_state\
$git_metrics\
$git_status\
$nix_shell\
$kubernetes\
$nodejs\
$php\
$ocaml\
$zig\
$azure\
$aws\
$time\
"""

[time]
disabled = true
format = "[$time]($style) "
time_format = "%T"  # This will give you the time in HH:MM:SS format
utc_time_offset = "local"
style = ''

[directory]
#truncation_length = 2
#truncation_symbol = '‚Ä¶/'
# disabled = true
# style = "bold fg:#E49B5D"
style = ''
# style = '#A98A78'

# Replace the '‚ĚĮ' symbol in the prompt with '‚ěú'
[character] # The name of the module we are configuring is 'character'
# success_symbol = '[‚ěú](#C1A78E)' # The 'success_symbol' segment is being set to '‚ěú' with the color 'bold green'
# error_symbol = '[‚ěú](#C1A78E)' # The 'success_symbol' segment is being set to '‚ěú' with the color 'bold green'
disabled = true

[azure]
disabled = false
format = ' [$symbol ($subscription)]($style)'
symbol = 'ůį†Ö '
style = ''

[aws]
style = ''
format = ' [$symbol($profile )(\($region\))]($style)'
symbol = "ÓĆĹ  "

[git_branch]
disabled = false
style = ''
format = ' [$symbol($branch)]($style)'

[git_commit]
disabled = true
style = ''

[git_state]
disabled = true
style = ''

[git_metrics]
disabled = true
style = ''

[git_status]
disabled = true
style = ''

[package]
disabled = false
format = ' [ůįŹó $version]($style)'
style = ''
display_private=true

[php]
format = ' [Óėą ($version)]($style)'
style = ''

[ocaml]
format = ' [Óôļ ($version )(\($switch_indicator$switch_name\) )]($style)'
style = ''

[zig]
format = ' [Óö© ($version )]($style)'
style = ''

[nodejs]
format = ' [$symbol($version)]($style)'
style = ''

[lua]
symbol = ' [Óė† $version](#C1A78E)'

[golang]
format = ' [Óėß $version](#C1A78E)'

[nix_shell]
disabled = true
impure_msg = '[impure shell](bold red)'
pure_msg = '[pure shell](bold green)'
unknown_msg = '[unknown shell](bold yellow)'
format = ' [ÔĆď $state( \($name\))](bold blue)'

[kubernetes]
symbol = ' ‚ėł  '
disabled = false
detect_extensions = ['yaml']
style = ''
format = '[$symbol$context( \($namespace\))]($style)'
# detect_files = [
#     "*values.yaml",     # Matches any file that ends with -values.yaml
#     "*deployment.yaml",  # Matches any file that includes deployment.yaml
#     "*service.yaml",     # Matches any file that includes service.yaml
#     "*ingress.yaml",     # Matches any file that includes ingress.yaml
#     "*Chart.yaml",       # Matches any file that includes Chart.yaml
#     "*configmap.yaml",   # Matches any file that includes configmap.yaml
#     "*secrets.yaml",     # Matches any file that includes secrets.yaml
#     "*persistentvolume.yaml",  # Matches any file that includes persistentvolume.yaml
#     "*persistentvolumeclaim.yaml",  # Matches any file that includes persistentvolumeclaim.yaml
#     "*namespace.yaml",   # Matches any file that includes namespace.yaml
#     "*pvc.yaml"          # Matches any file that includes pvc.yaml
# ]
detect_folders = [
    "k8s", "helm-charts"
]

